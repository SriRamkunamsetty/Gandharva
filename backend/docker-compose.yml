version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: gandarva_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: gandarva
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: gandarva_redis
    ports:
      - "6379:6379"
    restart: always

  # Worker and API will be run locally during dev, but docker-compose manages the infrastructure.

volumes:
  postgres_data:
